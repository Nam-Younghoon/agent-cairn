# 하네스 시크릿 감지 패턴
# 훅(.claude/hooks/*.py)이 이 파일을 로드하여 Write/Edit 툴 입력과 Bash 명령을 검사.
# 각 패턴은 PCRE 호환 정규식. name 은 차단 메시지에 표시됨.

patterns:
  - name: AWS Access Key ID
    regex: "AKIA[0-9A-Z]{16}"

  - name: AWS Secret Access Key (candidate)
    # 40자 base64 문자열과 "aws" 키워드 동반 시
    regex: "(?i)aws.{0,20}['\"]?[A-Za-z0-9/+=]{40}['\"]?"

  - name: GitHub Personal Access Token (classic)
    regex: "ghp_[A-Za-z0-9]{36}"

  - name: GitHub Fine-grained PAT
    regex: "github_pat_[A-Za-z0-9_]{80,}"

  - name: GitHub OAuth Token
    regex: "gho_[A-Za-z0-9]{36}"

  - name: GitHub App Token
    regex: "(ghu|ghs)_[A-Za-z0-9]{36}"

  - name: Slack Bot/User Token
    regex: "xox[abpr]-[A-Za-z0-9-]{10,}"

  - name: Slack Webhook URL
    regex: "https://hooks\\.slack\\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+"

  - name: Stripe Secret/Restricted Key
    regex: "(sk|rk)_(live|test)_[A-Za-z0-9]{20,}"

  - name: Google API Key
    regex: "AIza[0-9A-Za-z_-]{35}"

  - name: Google OAuth Access Token
    regex: "ya29\\.[0-9A-Za-z_-]{20,}"

  - name: JWT (candidate, 3부 base64)
    regex: "eyJ[A-Za-z0-9_-]{10,}\\.eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}"

  - name: Private Key (PEM)
    regex: "-----BEGIN (RSA|EC|DSA|OPENSSH|PGP) PRIVATE KEY-----"

  - name: OpenAI API Key
    regex: "sk-[A-Za-z0-9]{32,}"

  - name: Anthropic API Key
    regex: "sk-ant-[A-Za-z0-9_-]{40,}"

  - name: Azure Storage Account Key
    # 88자 base64 (== 포함) + azure/storage 키워드 동반
    regex: "(?i)(?:azure|storage).{0,30}['\"][A-Za-z0-9+/]{86}==['\"]"

  - name: Twilio Account SID
    regex: "AC[a-f0-9]{32}"

  - name: Twilio Auth Token (candidate)
    regex: "(?i)twilio.{0,20}['\"][a-f0-9]{32}['\"]"

  - name: SendGrid API Key
    regex: "SG\\.[A-Za-z0-9_-]{22}\\.[A-Za-z0-9_-]{43}"

  - name: Kakao REST API Key (candidate)
    regex: "(?i)kakao.{0,20}(?:rest|api)[_-]?key.{0,5}['\"][a-f0-9]{32}['\"]"

  - name: Kakao JavaScript Key (candidate)
    regex: "(?i)kakao.{0,20}(?:javascript|js)[_-]?key.{0,5}['\"][a-f0-9]{32}['\"]"

  - name: Naver Cloud Platform Access Key
    # NCP access key 는 보통 20자 영숫자
    regex: "(?i)(?:ncp|naver).{0,30}access[_-]?key.{0,5}['\"][A-Za-z0-9]{20}['\"]"

  - name: Naver Cloud Platform Secret Key
    # NCP secret key 는 40자 이상 영숫자
    regex: "(?i)(?:ncp|naver).{0,30}secret[_-]?key.{0,5}['\"][A-Za-z0-9/+=]{40,}['\"]"

  - name: Toss Payments Secret Key
    regex: "test_sk_[A-Za-z0-9]{20,}|live_sk_[A-Za-z0-9]{20,}"

  - name: Generic high-entropy secret 할당
    # KEY=..., SECRET=..., TOKEN=..., PASSWORD=... 뒤에 20자 이상 값이 할당된 경우
    regex: "(?i)(api[_-]?key|secret[_-]?key|access[_-]?token|password)\\s*[:=]\\s*['\"][A-Za-z0-9/+=_-]{20,}['\"]"
